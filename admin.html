<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kane & Sally — Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<!-- jsPDF for PDF export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #f8f4ee;
    --cream-mid: #f0e9dc;
    --champagne: #e8d9bc;
    --gold: #b8935a;
    --gold-light: #d4a96a;
    --gold-pale: #f0e6cf;
    --dark: #17140f;
    --text: #2e2820;
    --text-light: #7a6e62;
    --text-muted: #a8998a;
    --sidebar-w: 240px;
    --green: #5a8a6a;
    --red: #8a5a5a;
    --blue: #5a6a8a;
  }

  html, body { height: 100%; font-family: 'Jost', sans-serif; background: #f0ece4; color: var(--text); }

  /* ── LOGIN GATE ── */
  #loginGate {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--cream);
    display: flex; align-items: center; justify-content: center;
  }

  .login-box {
    width: 100%; max-width: 380px; padding: 2rem;
    text-align: center;
    animation: fadeUp .8s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to { opacity:1; transform:translateY(0); }
  }

  .login-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem; font-weight: 300; font-style: italic;
    color: var(--gold); margin-bottom: .3rem;
  }

  .login-sub {
    font-size: .65rem; letter-spacing: .25em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 2.5rem;
  }

  .login-label {
    font-size: .65rem; letter-spacing: .18em; text-transform: uppercase;
    color: var(--text-light); display: block; margin-bottom: .8rem; text-align: left;
  }

  .login-input {
    width: 100%; background: transparent; border: none;
    border-bottom: 1px solid rgba(184,147,90,.4);
    padding: .6rem 0; font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem; font-weight: 300; color: var(--text);
    text-align: center; letter-spacing: .3em; outline: none;
    transition: border-color .3s; margin-bottom: 1.8rem;
  }
  .login-input:focus { border-bottom-color: var(--gold); }

  .login-btn {
    width: 100%; background: var(--gold); border: 1px solid var(--gold);
    color: var(--cream); font-family: 'Jost', sans-serif; font-weight: 300;
    font-size: .7rem; letter-spacing: .25em; text-transform: uppercase;
    padding: 1rem; cursor: pointer; transition: all .3s;
  }
  .login-btn:hover { background: transparent; color: var(--gold); }

  .login-err {
    margin-top: .8rem; font-size: .72rem; color: #a06060;
    min-height: 1.2em; opacity: 0; transition: opacity .3s;
  }
  .login-err.show { opacity: 1; }

  /* ── LAYOUT ── */
  #app { display: none; height: 100vh; overflow: hidden; }
  #app.visible { display: flex; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--dark);
    display: flex; flex-direction: column;
    flex-shrink: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-logo {
    padding: 1.8rem 1.5rem 1.4rem;
    border-bottom: 1px solid rgba(255,255,255,.07);
  }

  .sidebar-logo h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem; font-weight: 300; font-style: italic;
    color: var(--gold); line-height: 1;
  }

  .sidebar-logo p {
    font-size: .6rem; letter-spacing: .2em; text-transform: uppercase;
    color: rgba(255,255,255,.3); margin-top: .3rem;
  }

  .sidebar-nav { padding: 1.2rem 0; flex: 1; }

  .nav-item {
    display: flex; align-items: center; gap: .8rem;
    padding: .75rem 1.5rem; font-size: .72rem; letter-spacing: .12em;
    text-transform: uppercase; color: rgba(255,255,255,.45);
    cursor: pointer; transition: all .2s; border: none; background: none;
    width: 100%; text-align: left;
  }
  .nav-item:hover { color: rgba(255,255,255,.8); background: rgba(255,255,255,.04); }
  .nav-item.active { color: var(--gold); background: rgba(184,147,90,.1); border-left: 2px solid var(--gold); }

  .nav-item svg { width: 14px; height: 14px; flex-shrink: 0; opacity: .6; }
  .nav-item.active svg { opacity: 1; }

  .sidebar-footer {
    padding: 1.2rem 1.5rem;
    border-top: 1px solid rgba(255,255,255,.07);
    font-size: .62rem; letter-spacing: .1em; text-transform: uppercase;
    color: rgba(255,255,255,.2);
  }

  .live-indicator {
    display: flex; align-items: center; gap: .4rem;
    font-size: .6rem; letter-spacing: .12em; text-transform: uppercase;
    color: rgba(255,255,255,.35); padding: .4rem 1.5rem 1rem;
  }

  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
    animation: livePulse 2s infinite;
  }

  @keyframes livePulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:.5; transform:scale(.75); }
  }

  /* ── MAIN ── */
  .main {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column;
    min-width: 0;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--cream); border-bottom: 1px solid rgba(184,147,90,.15);
    padding: 1rem 2.5rem; display: flex; align-items: center;
    justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    flex-shrink: 0;
  }

  .topbar-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem; font-weight: 300; font-style: italic; color: var(--text);
  }

  .topbar-actions { display: flex; gap: .8rem; align-items: center; flex-wrap: wrap; }

  .action-btn {
    background: transparent; border: 1px solid rgba(184,147,90,.4);
    color: var(--text-light); font-family: 'Jost', sans-serif; font-weight: 300;
    font-size: .65rem; letter-spacing: .18em; text-transform: uppercase;
    padding: .6rem 1.2rem; cursor: pointer; transition: all .25s;
    display: flex; align-items: center; gap: .5rem; white-space: nowrap;
  }
  .action-btn:hover { border-color: var(--gold); color: var(--gold); }
  .action-btn.primary { background: var(--gold); border-color: var(--gold); color: var(--cream); }
  .action-btn.primary:hover { background: transparent; color: var(--gold); }
  .action-btn svg { width: 12px; height: 12px; }

  /* ── PANELS ── */
  .panel { display: none; padding: 2rem 2.5rem 3rem; }
  .panel.active { display: block; }

  /* ── STAT CARDS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 1rem; margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--cream); border: 1px solid rgba(184,147,90,.15);
    padding: 1.5rem 1.8rem;
    animation: fadeUp .5s ease forwards; opacity: 0;
  }

  .stat-card:nth-child(1) { animation-delay:.05s; }
  .stat-card:nth-child(2) { animation-delay:.12s; }
  .stat-card:nth-child(3) { animation-delay:.19s; }
  .stat-card:nth-child(4) { animation-delay:.26s; }
  .stat-card:nth-child(5) { animation-delay:.33s; }
  .stat-card:nth-child(6) { animation-delay:.40s; }

  .sc-label { font-size: .6rem; letter-spacing: .22em; text-transform: uppercase; color: var(--text-muted); margin-bottom: .5rem; }
  .sc-value { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 300; color: var(--text); line-height: 1; }
  .sc-sub { font-size: .7rem; color: var(--text-muted); margin-top: .3rem; font-weight: 200; }
  .sc-value.green { color: var(--green); }
  .sc-value.red { color: var(--red); }
  .sc-value.gold { color: var(--gold); }

  /* ── FILTERS BAR ── */
  .filters-bar {
    background: var(--cream); border: 1px solid rgba(184,147,90,.15);
    padding: 1rem 1.5rem;
    display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
    margin-bottom: 1.2rem;
  }

  .filter-label { font-size: .6rem; letter-spacing: .18em; text-transform: uppercase; color: var(--text-muted); flex-shrink: 0; }

  .filter-select {
    background: transparent; border: 1px solid rgba(184,147,90,.25);
    font-family: 'Jost', sans-serif; font-weight: 300; font-size: .75rem;
    color: var(--text); padding: .4rem .8rem; outline: none; cursor: pointer;
    transition: border-color .2s;
  }
  .filter-select:focus { border-color: var(--gold); }

  .search-input {
    background: transparent; border: 1px solid rgba(184,147,90,.25);
    font-family: 'Jost', sans-serif; font-weight: 300; font-size: .78rem;
    color: var(--text); padding: .4rem .9rem; outline: none;
    transition: border-color .2s; min-width: 200px; flex: 1;
  }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: var(--text-muted); font-size: .72rem; }

  .filter-count {
    margin-left: auto; font-size: .68rem; color: var(--text-muted);
    white-space: nowrap; font-weight: 200;
  }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--cream); border: 1px solid rgba(184,147,90,.15);
    overflow: auto;
  }

  table { width: 100%; border-collapse: collapse; font-size: .8rem; }

  thead tr { border-bottom: 1px solid rgba(184,147,90,.2); }

  th {
    padding: .9rem 1.2rem; font-size: .6rem; letter-spacing: .2em;
    text-transform: uppercase; color: var(--text-muted); font-weight: 400;
    text-align: left; white-space: nowrap; cursor: pointer; user-select: none;
  }
  th:hover { color: var(--gold); }

  td {
    padding: .9rem 1.2rem; border-bottom: 1px solid rgba(184,147,90,.08);
    color: var(--text-light); font-weight: 200; line-height: 1.5;
    vertical-align: top;
  }

  tr:last-child td { border-bottom: none; }

  tbody tr {
    transition: background .15s;
    cursor: pointer;
  }
  tbody tr:hover { background: rgba(184,147,90,.04); }

  .badge {
    display: inline-block; padding: .2rem .6rem;
    font-size: .6rem; letter-spacing: .12em; text-transform: uppercase;
    border-radius: 1px;
  }

  .badge-attending { background: rgba(90,138,106,.12); color: var(--green); border: 1px solid rgba(90,138,106,.25); }
  .badge-declined { background: rgba(138,90,90,.1); color: var(--red); border: 1px solid rgba(138,90,90,.2); }
  .badge-event { background: rgba(184,147,90,.1); color: var(--gold); border: 1px solid rgba(184,147,90,.2); font-size:.55rem; margin:1px; }

  .td-name { color: var(--text); font-weight: 300; font-size: .85rem; }
  .td-email { font-size: .72rem; color: var(--text-muted); }

  .empty-state {
    text-align: center; padding: 4rem 2rem;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1.2rem; color: var(--text-muted);
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(23,20,15,.5); backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--cream); max-width: 580px; width: 100%;
    max-height: 88vh; overflow-y: auto;
    animation: fadeUp .3s ease forwards;
    border: 1px solid rgba(184,147,90,.2);
  }

  .modal-header {
    padding: 1.5rem 2rem; border-bottom: 1px solid rgba(184,147,90,.15);
    display: flex; justify-content: space-between; align-items: center;
  }

  .modal-header h2 {
    font-family: 'Cormorant Garamond', serif; font-size: 1.4rem;
    font-weight: 300; font-style: italic; color: var(--text);
  }

  .modal-close {
    background: none; border: none; cursor: pointer; font-size: 1.2rem;
    color: var(--text-muted); transition: color .2s; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 1.5rem 2rem; }

  .detail-row {
    display: grid; grid-template-columns: 140px 1fr;
    gap: .5rem; padding: .7rem 0; border-bottom: 1px solid rgba(184,147,90,.08);
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-key { font-size: .62rem; letter-spacing: .18em; text-transform: uppercase; color: var(--text-muted); padding-top: .1rem; }
  .detail-val { font-size: .85rem; color: var(--text); font-weight: 300; line-height: 1.6; word-break: break-word; }

  /* ── CHARTS PANEL ── */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }

  .chart-card {
    background: var(--cream); border: 1px solid rgba(184,147,90,.15); padding: 1.5rem;
  }
  .chart-card h3 { font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1.2rem; }

  .bar-chart { display: flex; flex-direction: column; gap: .8rem; }
  .bar-row { display: flex; align-items: center; gap: .8rem; }
  .bar-label { font-size: .72rem; color: var(--text-light); font-weight: 200; width: 120px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 6px; background: rgba(184,147,90,.1); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width .8s ease; }
  .bar-val { font-size: .68rem; color: var(--text-muted); width: 24px; text-align: right; flex-shrink: 0; }

  .pie-row { display: flex; align-items: center; gap: 1.5rem; }
  .donut-wrap { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
  .donut-wrap svg { transform: rotate(-90deg); }
  .donut-center {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; flex-direction: column;
  }
  .donut-pct { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 300; color: var(--text); line-height: 1; }
  .donut-sub { font-size: .55rem; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); }

  .pie-legend { display: flex; flex-direction: column; gap: .5rem; }
  .legend-item { display: flex; align-items: center; gap: .5rem; font-size: .72rem; color: var(--text-light); font-weight: 200; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* loading spinner */
  .spinner {
    display: flex; align-items: center; justify-content: center; padding: 3rem;
    font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; color: var(--text-muted);
    gap: .6rem;
  }
  .spin-dot {
    width: 6px; height: 6px; background: var(--gold); border-radius: 50%;
    animation: spinBounce .9s infinite alternate;
  }
  .spin-dot:nth-child(2) { animation-delay:.3s; }
  .spin-dot:nth-child(3) { animation-delay:.6s; }
  @keyframes spinBounce { from { transform:scale(1); opacity:1; } to { transform:scale(.4); opacity:.3; } }

  /* toast */
  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 500;
    background: var(--dark); color: rgba(255,255,255,.85);
    padding: .8rem 1.5rem; font-size: .72rem; letter-spacing: .05em;
    transform: translateY(60px); opacity: 0; transition: all .35s;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 900px) {
    .sidebar { width: 60px; }
    .sidebar-logo p, .nav-item span, .live-indicator span, .sidebar-footer { display: none; }
    .sidebar-logo h1 { font-size: 1rem; }
    .nav-item { justify-content: center; padding: .9rem; }
    .panel { padding: 1.5rem; }
    .topbar { padding: 1rem 1.5rem; }
    .charts-grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .table-wrap { overflow-x: auto; }
    th, td { padding: .7rem .8rem; }
  }
</style>
</head>
<body>

<!-- ── LOGIN GATE ── -->
<div id="loginGate">
  <div class="login-box">
    <div class="login-logo">K & S</div>
    <p class="login-sub">Admin Dashboard</p>
    <label class="login-label">Admin Password</label>
    <input class="login-input" type="password" id="adminPw" placeholder="• • • • • •" autocomplete="off">
    <button class="login-btn" onclick="adminLogin()">Access Dashboard</button>
    <p class="login-err" id="adminErr">Incorrect password. Please try again.</p>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>K & S</h1>
      <p>Admin Portal</p>
    </div>
    <div class="live-indicator">
      <div class="live-dot"></div>
      <span>Live Updates On</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="showPanel('overview', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Overview</span>
      </button>
      <button class="nav-item" onclick="showPanel('responses', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Responses</span>
      </button>
      <button class="nav-item" onclick="showPanel('analytics', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Analytics</span>
      </button>
      <button class="nav-item" onclick="showPanel('dietary', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M12 8v4l3 3"/></svg>
        <span>Dietary</span>
      </button>
    </nav>
    <div class="sidebar-footer">Kane & Sally 2027</div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <span class="topbar-title" id="panelTitle">Overview</span>
      <div class="topbar-actions">
        <button class="action-btn" onclick="refreshData()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.24-5.6"/></svg>
          Refresh
        </button>
        <button class="action-btn" onclick="exportCSV()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV
        </button>
        <button class="action-btn primary" onclick="exportPDF()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Download PDF
        </button>
      </div>
    </div>

    <!-- ── OVERVIEW PANEL ── -->
    <div class="panel active" id="panel-overview">
      <div class="stats-grid" id="statsGrid">
        <div class="spinner"><div class="spin-dot"></div><div class="spin-dot"></div><div class="spin-dot"></div></div>
      </div>

      <!-- Recent -->
      <div style="margin-top:1.5rem;">
        <p style="font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.9rem;">Recent RSVPs</p>
        <div class="table-wrap" id="recentTable">
          <div class="spinner"><div class="spin-dot"></div><div class="spin-dot"></div><div class="spin-dot"></div></div>
        </div>
      </div>
    </div>

    <!-- ── RESPONSES PANEL ── -->
    <div class="panel" id="panel-responses">
      <div class="filters-bar">
        <span class="filter-label">Filter</span>
        <input class="search-input" type="text" id="searchInput" placeholder="Search by name or email…" oninput="applyFilters()">
        <select class="filter-select" id="filterAttending" onchange="applyFilters()">
          <option value="">All Responses</option>
          <option value="yes">Attending</option>
          <option value="no">Not Attending</option>
        </select>
        <select class="filter-select" id="filterEvent" onchange="applyFilters()">
          <option value="">All Events</option>
          <option value="welcome_dinner">Welcome Dinner</option>
          <option value="wedding_day">Wedding Day</option>
          <option value="sunday_fiesta">Sunday Fiesta</option>
        </select>
        <select class="filter-select" id="filterAccom" onchange="applyFilters()">
          <option value="">All Hotels</option>
          <option value="fiesta_americana">Fiesta Americana</option>
          <option value="radisson">Radisson</option>
          <option value="other">Other</option>
        </select>
        <span class="filter-count" id="filterCount">— entries</span>
      </div>
      <div class="table-wrap" id="allTable">

  async function initFirebase() {

  // ── RENDER ALL ──
  function renderAll() {
    renderStats();
    renderRecentTable();

  // ── STATS ──
  function renderStats() {
    const total = allRsvps.length;
    const attending = allRsvps.filter(r => r.attending === 'yes').length;
    const declined = allRsvps.filter(r => r.attending === 'no').length;
    const plusOnes = allRsvps.filter(r => r.plusOne === 'yes').length;
    const totalGuests = attending + plusOnes;
    const needTransport = allRsvps.filter(r => r.requiresTransport === 'yes').length;
    const dietary = allRsvps.filter(r => r.dietary && r.dietary.trim()).length;

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><p class="sc-label">Total RSVPs</p><p class="sc-value gold">${total}</p><p class="sc-sub">Responses received</p></div>
      <div class="stat-card"><p class="sc-label">Attending</p><p class="sc-value green">${attending}</p><p class="sc-sub">Confirmed yes</p></div>

  // ── ALL TABLE ──
  function renderAllTable(data) {
    document.getElementById('filterCount').textContent = `${data.length} of ${allRsvps.length} entries`;
    document.getElementById('allTable').innerHTML = buildTable(data, false);
  }

  function buildTable(data, compact) {
    if (!data.length) return '<div class="empty-state">No responses yet</div>';

    const eventLabel = { welcome_dinner:'Fri', wedding_day:'Sat', sunday_fiesta:'Sun' };
    const accomLabel = { fiesta_americana:'Fiesta Americana', radisson:'Radisson', other:'Other' };

    let html = `<table><thead><tr>
      <th>Guest</th>
      ${compact ? '' : '<th>Phone</th>'}
      <th>Attending</th>
      <th>Events</th>
      <th>Hotel</th>
      ${compact ? '' : '<th>Transport</th>'}
      <th>Submitted</th>
    </tr></thead><tbody>`;

    data.forEach(r => {
      const ts = r.submittedAt?.seconds ? new Date(r.submittedAt.seconds * 1000).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
      const events = (r.events || []).map(e => `<span class="badge badge-event">${eventLabel[e]||e}</span>`).join('');
      const accom = r.accommodation === 'other' ? (r.otherAccom||'Other') : (accomLabel[r.accommodation]||r.accommodation||'—');

      html += `<tr onclick="openModal('${r.id}')">
        <td>
          <div class="td-name">${r.fullName||'—'}</div>
          <div class="td-email">${r.email||''}</div>
          ${r.plusOne==='yes'&&r.guestName ? `<div class="td-email" style="color:var(--gold);font-size:.68rem;">+ ${r.guestName}</div>` : ''}

        ${compact ? '' : `<td style="font-size:.75rem;">${r.phone||'—'}</td>`}
        <td><span class="badge ${r.attending==='yes'?'badge-attending':'badge-declined'}">${r.attending==='yes'?'Attending':'Declined'}</span></td>
        <td>${events||'—'}</td>
        <td style="font-size:.75rem;">${accom}</td>
        ${compact ? '' : `<td><span class="badge ${r.requiresTransport==='yes'?'badge-attending':'badge-declined'}" style="font-size:.58rem;">${r.requiresTransport==='yes'?'Yes':'No'}</span></td>`}

      </tr>`;
    });

    html += '</tbody></table>';
    return html;
  }

  // ── FILTERS ──
  window.applyFilters = function() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const attending = document.getElementById('filterAttending').value;
    const event = document.getElementById('filterEvent').value;
    const accom = document.getElementById('filterAccom').value;

    const filtered = allRsvps.filter(r => {
      const matchSearch = !search ||
        (r.fullName||'').toLowerCase().includes(search) ||
        (r.email||'').toLowerCase().includes(search) ||
        (r.guestName||'').toLowerCase().includes(search);
      const matchAttending = !attending || r.attending === attending;
      const matchEvent = !event || (r.events||[]).includes(event);
      const matchAccom = !accom || r.accommodation === accom;
      return matchSearch && matchAttending && matchEvent && matchAccom;
    });

    renderAllTable(filtered);
  };

  // ── ANALYTICS ──
  function renderAnalytics() {
    const attending = allRsvps.filter(r => r.attending === 'yes').length;
    const declined = allRsvps.filter(r => r.attending === 'no').length;
    const total = allRsvps.length || 1;

    const fri = allRsvps.filter(r => (r.events||[]).includes('welcome_dinner')).length;
    const sat = allRsvps.filter(r => (r.events||[]).includes('wedding_day')).length;
    const sun = allRsvps.filter(r => (r.events||[]).includes('sunday_fiesta')).length;
    const maxEvent = Math.max(fri, sat, sun, 1);

    const fa = allRsvps.filter(r => r.accommodation === 'fiesta_americana').length;
    const rad = allRsvps.filter(r => r.accommodation === 'radisson').length;
    const other = allRsvps.filter(r => r.accommodation === 'other').length;
    const none = allRsvps.filter(r => !r.accommodation).length;
    const maxAccom = Math.max(fa, rad, other, none, 1);

    const attendPct = total ? Math.round((attending/total)*100) : 0;
    const plusOnes = allRsvps.filter(r => r.plusOne === 'yes').length;
    const maxPlus = Math.max(plusOnes, total - plusOnes, 1);

    document.getElementById('chartsGrid').innerHTML = `
      <div class="chart-card">
        <h3>Attendance Response</h3>
        <div class="pie-row">
          <div class="donut-wrap">
            <svg width="100" height="100" viewBox="0 0 36 36">
              <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(184,147,90,.1)" stroke-width="3"/>
              <circle cx="18" cy="18" r="15.9" fill="none" stroke="#5a8a6a" stroke-width="3"
                stroke-dasharray="${attendPct} ${100-attendPct}" stroke-linecap="butt"/>
            </svg>
            <div class="donut-center"><span class="donut-pct">${attendPct}%</span><span class="donut-sub">Attending</span></div>
          </div>
          <div class="pie-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#5a8a6a;"></div>Attending (${attending})</div>
            <div class="legend-item"><div class="legend-dot" style="background:#8a5a5a;"></div>Declined (${declined})</div>
            <div class="legend-item"><div class="legend-dot" style="background:rgba(184,147,90,.3);"></div>Awaiting (${Math.max(0, 0)})</div>
          </div>
        </div>
      </div>

      <div class="chart-card">
        <h3>Event Attendance</h3>
        <div class="bar-chart">
          <div class="bar-row"><span class="bar-label">Welcome Dinner</span><div class="bar-track"><div class="bar-fill" style="width:${(fri/maxEvent)*100}%;"></div></div><span class="bar-val">${fri}</span></div>
          <div class="bar-row"><span class="bar-label">Wedding Day</span><div class="bar-track"><div class="bar-fill" style="width:${(sat/maxEvent)*100}%;"></div></div><span class="bar-val">${sat}</span></div>
          <div class="bar-row"><span class="bar-label">Sunday Fiesta</span><div class="bar-track"><div class="bar-fill" style="width:${(sun/maxEvent)*100}%;"></div></div><span class="bar-val">${sun}</span></div>
        </div>
      </div>

      <div class="chart-card">
        <h3>Accommodation</h3>
        <div class="bar-chart">
          <div class="bar-row"><span class="bar-label">Fiesta Americana</span><div class="bar-track"><div class="bar-fill" style="width:${(fa/maxAccom)*100}%;"></div></div><span class="bar-val">${fa}</span></div>
          <div class="bar-row"><span class="bar-label">Radisson</span><div class="bar-track"><div class="bar-fill" style="width:${(rad/maxAccom)*100}%;"></div></div><span class="bar-val">${rad}</span></div>
          <div class="bar-row"><span class="bar-label">Other</span><div class="bar-track"><div class="bar-fill" style="width:${(other/maxAccom)*100}%;"></div></div><span class="bar-val">${other}</span></div>
          <div class="bar-row"><span class="bar-label">Not Specified</span><div class="bar-track"><div class="bar-fill" style="width:${(none/maxAccom)*100}%;background:rgba(184,147,90,.3);"></div></div><span class="bar-val">${none}</span></div>
        </div>
      </div>

      <div class="chart-card">
        <h3>Plus-One Breakdown</h3>
        <div class="bar-chart">
          <div class="bar-row"><span class="bar-label">Bringing Guest</span><div class="bar-track"><div class="bar-fill" style="width:${(plusOnes/maxPlus)*100}%;background:#5a6a8a;"></div></div><span class="bar-val">${plusOnes}</span></div>
          <div class="bar-row"><span class="bar-label">Solo</span><div class="bar-track"><div class="bar-fill" style="width:${((total-plusOnes)/maxPlus)*100}%;"></div></div><span class="bar-val">${total-plusOnes}</span></div>
          <div class="bar-row"><span class="bar-label">Transport Needed</span><div class="bar-track"><div class="bar-fill" style="width:${(allRsvps.filter(r=>r.requiresTransport==='yes').length/Math.max(total,1))*100}%;background:#8a6a5a;"></div></div><span class="bar-val">${allRsvps.filter(r=>r.requiresTransport==='yes').length}</span></div>
        </div>
      </div>
    `;
  }

  // ── DIETARY ──
  function renderDietary() {
    const withDietary = allRsvps.filter(r => r.dietary && r.dietary.trim());
    if (!withDietary.length) {
      document.getElementById('dietaryTable').innerHTML = '<div class="empty-state">No dietary requirements noted</div>';
      return;
    }
    let html = `<table><thead><tr><th>Guest</th><th>Email</th><th>Dietary Requirements</th><th>Events</th></tr></thead><tbody>`;
    const eventLabel = { welcome_dinner:'Fri', wedding_day:'Sat', sunday_fiesta:'Sun' };
    withDietary.forEach(r => {
      const events = (r.events||[]).map(e => `<span class="badge badge-event">${eventLabel[e]||e}</span>`).join('');
      html += `<tr onclick="openModal('${r.id}')">
        <td><div class="td-name">${r.fullName}</div>${r.guestName?`<div class="td-email" style="color:var(--gold);font-size:.68rem;">+ ${r.guestName}</div>`:''}</td>
        <td style="font-size:.75rem;">${r.email}</td>
        <td style="font-size:.83rem;color:var(--text);font-weight:300;">${r.dietary}</td>
        <td>${events||'—'}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('dietaryTable').innerHTML = html;
  }

  // ── MODAL ──
  window.openModal = function(id) {
    const r = allRsvps.find(x => x.id === id);

    const eventNames = { welcome_dinner:'Welcome Dinner (Friday)', wedding_day:'Wedding Day (Saturday)', sunday_fiesta:'Sunday Fiesta' };

    const events = (r.events||[]).map(e => eventNames[e]||e).join(', ') || '—';

    document.getElementById('modalName').textContent = r.fullName || 'Guest Details';
    document.getElementById('modalBody').innerHTML = `
      <div class="detail-row"><span class="detail-key">Full Name</span><span class="detail-val">${r.fullName||'—'}</span></div>
      <div class="detail-row"><span class="detail-key">Email</span><span class="detail-val">${r.email||'—'}</span></div>
      <div class="detail-row"><span class="detail-key">Phone</span><span class="detail-val">${r.phone||'—'}</span></div>
      <div class="detail-row"><span class="detail-key">Attending</span><span class="detail-val">${r.attending==='yes'?'✓ Yes':'✗ Declined'}</span></div>

      <div class="detail-row"><span class="detail-key">Submitted</span><span class="detail-val">${ts}</span></div>
    `;
    document.getElementById('modal').classList.add('open');
  };

  window.closeModal = function() {
    document.getElementById('modal').classList.remove('open');
  };

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── PANEL NAVIGATION ──
  const panelTitles = { overview:'Overview', responses:'All Responses', analytics:'Analytics', dietary:'Dietary Requirements' };

  window.showPanel = function(name, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

    document.getElementById('panelTitle').textContent = panelTitles[name]||name;
  };

        r.submittedAt?.seconds ? new Date(r.submittedAt.seconds*1000).toLocaleDateString('en-GB') : '—'
      ]),
      styles: { font:'helvetica', fontSize:7, cellPadding:2, textColor:[46,40,32], lineColor:[232,217,188], lineWidth:0.2 },
      headStyles: { fillColor:[248,244,238], textColor:[184,147,90], fontStyle:'bold', fontSize:7 },
      alternateRowStyles: { fillColor:[252,249,245] },
      columnStyles: {
        0:{cellWidth:6}, 1:{cellWidth:28}, 2:{cellWidth:38}, 3:{cellWidth:22},
        4:{cellWidth:14}, 5:{cellWidth:14}, 6:{cellWidth:22}, 7:{cellWidth:14},
        8:{cellWidth:26}, 9:{cellWidth:14}, 10:{cellWidth:20}, 11:{cellWidth:30}
      },
      margin:{left:14, right:14}
    });

    // Dietary requirements page
    const withDietary = allRsvps.filter(r => r.dietary && r.dietary.trim());
    if (withDietary.length) {
      doc.addPage();
      doc.setFont('helvetica','bold');
      doc.setFontSize(14);
      doc.setTextColor(184,147,90);
      doc.text('Dietary Requirements & Allergies', 14, 18);
      doc.setFont('helvetica','normal');
      doc.setFontSize(8);
      doc.setTextColor(120,110,100);
      doc.text(`${withDietary.length} guests with dietary requirements`, 14, 24);

      doc.autoTable({
        startY: 30,
        head: [['Guest', 'Email', 'Phone', 'Dietary Requirements / Allergies', 'Events']],
        body: withDietary.map(r => [
          r.fullName + (r.guestName ? ` + ${r.guestName}` : ''),
          r.email||'—',
          r.phone||'—',
          r.dietary,
          (r.events||[]).map(e=>eventLabel[e]||e).join(', ')||'—'
        ]),
        styles: { font:'helvetica', fontSize:8, cellPadding:3, textColor:[46,40,32] },
        headStyles: { fillColor:[248,244,238], textColor:[184,147,90], fontStyle:'bold' },
        alternateRowStyles: { fillColor:[252,249,245] },
        columnStyles: { 0:{cellWidth:45}, 1:{cellWidth:55}, 2:{cellWidth:35}, 3:{cellWidth:100}, 4:{cellWidth:22} },
        margin:{left:14, right:14}
      });
    }

    // Transport page
    const needsTransport = allRsvps.filter(r => r.requiresTransport === 'yes');
    if (needsTransport.length) {
      doc.addPage();
      doc.setFont('helvetica','bold');
      doc.setFontSize(14);
      doc.setTextColor(184,147,90);
      doc.text('Transport Requirements', 14, 18);
      doc.setFont('helvetica','normal');
      doc.setFontSize(8);
      doc.setTextColor(120,110,100);
      doc.text(`${needsTransport.length} guests requiring transport`, 14, 24);

      doc.autoTable({
        startY: 30,
        head: [['Guest', 'Phone', 'Pickup Location', 'Hotel', 'Events', 'Plus-One']],
        body: needsTransport.map(r => [
          r.fullName,
          r.phone||'—',
          r.pickupLocation||'—',
          r.accommodation==='other'?(r.otherAccom||'Other'):(accomLabel[r.accommodation]||'—'),
          (r.events||[]).map(e=>eventLabel[e]||e).join(', ')||'—',
          r.plusOne==='yes'?`Yes (${r.guestName||'guest'})`: 'No'
        ]),
        styles: { font:'helvetica', fontSize:8, cellPadding:3, textColor:[46,40,32] },
        headStyles: { fillColor:[248,244,238], textColor:[184,147,90], fontStyle:'bold' },
        alternateRowStyles: { fillColor:[252,249,245] },
        margin:{left:14, right:14}
      });
    }

    // Footer on each page
    const pageCount = doc.internal.getNumberOfPages();
    for (let i = 1; i <= pageCount; i++) {
      doc.setPage(i);
      doc.setFontSize(7);
      doc.setTextColor(168,153,138);
      doc.text(`Kane & Sally 2027 — RSVP Report — Page ${i} of ${pageCount}`, 14, doc.internal.pageSize.height - 8);
      doc.text(`Confidential`, doc.internal.pageSize.width - 30, doc.internal.pageSize.height - 8);
    }

    const filename = `Kane-Sally-RSVPs-${new Date().toISOString().slice(0,10)}.pdf`;
    doc.save(filename);
    showToast(`PDF downloaded: ${filename}`);
  };

  // ── CSV EXPORT ──
  window.exportCSV = function() {
    const headers = ['Name','Email','Phone','Attending','Plus-One','Guest Name','Events','Hotel','Transport','Pickup','Dietary','Submitted'];
    const eventLabel = { welcome_dinner:'Fri Dinner', wedding_day:'Sat Wedding', sunday_fiesta:'Sun Fiesta' };
    const accomLabel = { fiesta_americana:'Fiesta Americana', radisson:'Radisson', other:'Other' };
    const rows = allRsvps.map(r => [
      r.fullName||'',
      r.email||'',
      r.phone||'',
      r.attending==='yes'?'Yes':'No',
      r.plusOne==='yes'?'Yes':'No',
      r.guestName||'',
      (r.events||[]).map(e=>eventLabel[e]||e).join(' | '),
      r.accommodation==='other'?(r.otherAccom||'Other'):(accomLabel[r.accommodation]||r.accommodation||''),
      r.requiresTransport==='yes'?'Yes':'No',
      r.pickupLocation||'',
      (r.dietary||'').replace(/,/g,';'),
      r.submittedAt?.seconds ? new Date(r.submittedAt.seconds*1000).toLocaleDateString('en-GB') : ''
    ].map(v => `"${v}"`));

    const csv = [headers.map(h=>`"${h}"`).join(','), ...rows.map(r=>r.join(','))].join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
    a.download = `Kane-Sally-RSVPs-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    showToast('CSV downloaded');
  };

  // ── TOAST ──
  window.showToast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  };
</script>
</body>
</html>
